  </head>
  <body>
    <div id="root"></div>
    <script>
      // 检测主 JS 加载失败（通常是缓存了旧 index.html 导致 404），自动硬刷新一次
      (function () {
        var attempted = sessionStorage.getItem('__reload_attempted__');
        if (attempted) return; // 已经尝试过一次，不再循环
        var scripts = document.querySelectorAll('script[type="module"][src]');
        scripts.forEach(function (s) {
          var src = s.getAttribute('src') || '';
          if (!src) return;
          fetch(src, { method: 'HEAD', cache: 'no-store' }).then(function (r) {
            if (!r.ok) {
              sessionStorage.setItem('__reload_attempted__', '1');
              location.reload();
            }
          }).catch(function () {
            sessionStorage.setItem('__reload_attempted__', '1');
            location.reload();
          });
        });
        // 清除标记，让下次失败还能重试
        setTimeout(function () {
          sessionStorage.removeItem('__reload_attempted__');
        }, 10000);
      })();
    </script>
  </body>
</html>
